<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I’m Sorry</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}

.container {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 35px;
  border-radius: 20px;
  width: 90%;
  max-width: 520px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  text-align: center;
}

h1 {
  font-weight: 500;
}

input {
  padding: 12px;
  width: 80%;
  margin-top: 15px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  padding: 12px 25px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff4757;
}

.message {
  margin-top: 25px;
  font-size: 16px;
  line-height: 1.7;
  text-align: left;
  display: none;
  white-space: pre-line;
}

.fade {
  animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey…</h1>
  <p>Before you read this… just tell me your name</p>

  <input type="text" id="nameInput" placeholder="Your name">
  <br>
  <button onclick="startApology()">Continue</button>

  <div id="message" class="message"></div>
</div>

<!-- Soft Background Music -->
<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mp3">
</audio>

<script>
function startApology() {
  const name = document.getElementById("nameInput").value.trim();
  if(name === "") {
    alert("Please enter your name");
    return;
  }

  document.getElementById("bgMusic").play();

  const fullText = `${name}…

I don’t really know where to start… but I know I needed to say this.

I’m sorry.

Not just in a simple way… but in the way where I truly understand that I hurt you.

I didn’t understand you the way you deserved.
And maybe the worst part is… instead of communicating we both just ghosted each other and yelled at each other, which ruined the things.

You trusted me with your feelings… and I failed to handle them the right way.

And I’ve been thinking about that a lot.

About the moments I ignored, the things I didn’t notice, and the times you probably needed me… but I wasn’t really there, I seriously dont know
this that if you were going through something from the morning why didnt you tell me.
Am i not credible enough still for you?
Did I never make you feel lighter and happier I messaged you to have a last call with you, You was Okay with that, Like seriously, I am also
a human being I also have some feelings , you always shows up like You dont care if i am there or not. Even after every argument never ever try to 
stop the things which are making the conversation worst.
But at least valuing a person presence doesn't depend on any situations.
Everyone is going through something in there life but when you have someone who is expecting nothing from you, justto be valued , appreciated and have some 
efforts from your side and understanding nothing more than that, Is this too much to ask?

I know you also yelled at me and don't know whether you will say sorry or not and i don't need that being a mature person
who values things and person I am mature enough to apologise and can say this You didn’t deserve that.

I’m not writing this to change anything or to expect something back from you.

I just didn’t want my silence to be the last thing you remember from me.

You meant something to me… you still do.

And I’ll always regret the way I made you feel.

I just hope… that you understand this until the time is that I expects nothing from you just to feel I am also needed, have value infront of you,matters to you
and most important have a clear conversation

You want me to go from your life I will make your dream come true will disappear like never existed but i have a great news and is waiting for the 
confirmation will tell you on your birthday what the news is and then will never show you my face again so don't bother much you will be free after some time
it's just a matter of some days until then tolerate me a lil bit and Take care… always.`;

  const msgDiv = document.getElementById("message");
  msgDiv.style.display = "block";
  msgDiv.classList.add("fade");

  typeWriter(fullText, msgDiv, 0);
}

function typeWriter(text, element, i) {
  if (i < text.length) {
    element.innerHTML += text.charAt(i);
    setTimeout(() => typeWriter(text, element, i + 1), 30);
  }
}
</script>

</body>
</html>
